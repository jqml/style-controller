name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build
      - run: node --check main.js
      - name: Verify tag matches manifest version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG=${GITHUB_REF_NAME}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match manifest version $VERSION" >&2
            exit 1
          fi
      - uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css \
            --title "Style Controller $GITHUB_REF_NAME" \
            --notes "Style Controller $GITHUB_REF_NAME updates Community review compatibility, keeps reusable profiles and path overrides, uses static plugin styles, and remains local-only with no remote assets."
